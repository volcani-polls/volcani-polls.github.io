<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title data-i18n="register">Volcani Polls - הרשמה</title>
  <!-- i18n support -->
  <script type="module" src="js/i18n.js"></script>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand">
      <div class="brand-mark">
        <img src="assets/Volcani_W.png" alt="V" class="logo-img" style="width: 100%; height: 100%; object-fit: contain; border-radius: 14px;" onerror="this.style.display='none'; this.parentElement.textContent='V';">
      </div>
      <div>
        <h1>Volcani Polls</h1>
        <p data-i18n="register_page">עמוד הרשמה</p>
      </div>
    </div>

    <p class="vote-slogan" data-i18n="vote_slogan">מי שמצביע - משפיע!</p>

    <form id="registerForm" class="form">
      <p class="tiny-note" style="margin-bottom: 12px; margin-top: 0;" data-i18n="register_only_volcani">ניתן להירשם רק עם מייל ארגוני של מכון וולקני</p>
      <label>
        <span data-i18n="email">כתובת מייל</span>
        <input id="email" type="email" autocomplete="email" placeholder="username@volcani.agri.gov.il" autocapitalize="none" autocorrect="off" spellcheck="false" required>
      </label>
      <label>
        <span data-i18n="password_label_rules">סיסמה (לפחות 6 תווים)</span>
        <div class="password-wrapper">
          <input id="password" type="password" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false" required>
          <button type="button" id="togglePassword" class="password-toggle" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </label>
      <label>
        <span data-i18n="confirm_password">אימות סיסמה</span>
        <div class="password-wrapper">
          <input id="password2" type="password" autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false" required>
          <button type="button" id="togglePassword2" class="password-toggle" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </label>
      <button id="registerBtn" class="btn primary full" type="submit" data-i18n="register">הרשמה</button>
    </form>

    <div id="message" class="message" hidden></div>

    <div class="auth-switch">
      <p style="margin-bottom: 8px;">
        <span data-i18n="already_have_user">כבר יש לך משתמש? </span>
      </p>
      <a href="login.html" class="auth-link" data-i18n="login">להתחברות</a>
    </div>
    <p class="tiny-note" data-i18n="support_contact">במקרה של תקלות ניתן לפנות ל yehudah@volcani.agri.gov.il</p>
  </main>
  <script type="module" src="js/register.js"></script>
</body>
</html>
