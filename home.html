<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title data-i18n="app_title">מערכת הסקרים - כנס הסטודנטים השישי</title>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="home.html">
      <img src="assets/Volcani_W.png" alt="Volcani" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
      <span style="display:none;">V</span>
      <span class="logo-text" data-i18n="app_title">מערכת הסקרים - כנס הסטודנטים השישי</span>
    </a>
    <button class="hamburger-btn" onclick="this.nextElementSibling.classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <nav>
      <a href="home.html" data-i18n="nav_home"><i class="fa-solid fa-house"></i> דף הבית</a>
      <button class="btn link" data-logout type="button" data-i18n="nav_logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
    </nav>
  </header>

  <main class="container narrow page-transition">
    <section class="welcome-panel">
      <div id="loadingSpinner" class="spinner-container">
        <div class="spinner"></div>
        <p class="spinner-text">טוען...</p>
      </div>
      <div id="contentArea" style="display: none;">
        <p class="welcome-kicker" data-i18n="welcome_back">ברוכ/ה הבא/ה</p>
        <h1 id="welcomeTitle">טוען...</h1>
        <p id="roleBadge" class="role-badge" data-i18n="you_are_admin" hidden>את/ה מנהל/ת</p>
        <p id="welcomeSubtitle" class="muted welcome-subtitle" hidden>בחר את המסלול שתרצה/י להמשיך אליו.</p>
        <div id="welcomeActions" class="welcome-actions"></div>
      </div>
    </section>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
