<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Volcani Polls - ברוכים הבאים</title>
</head>
<body>
  <div id="pageTransitionOverlay" class="page-transition-overlay active show"><img src="assets/Volcani_W.png" alt="" class="page-transition-logo"></div>
  <header class="topbar">
    <a class="logo" href="home.html">
      <img src="assets/Volcani_W.png" alt="Volcani" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
      <span style="display:none;">V</span> Volcani Polls
    </a>
    <nav>
      <a href="home.html" data-i18n="nav_home">דף הבית</a>
      <button class="btn link" data-logout type="button" data-i18n="nav_logout">יציאה</button>
    </nav>
  </header>

  <main class="container narrow page-transition">
    <section class="welcome-panel">
      <div id="loadingSpinner" class="spinner-container">
        <div class="spinner"></div>
        <p class="spinner-text">טוען...</p>
      </div>
      <div id="contentArea" style="display: none;">
        <p class="welcome-kicker" data-i18n="welcome_back">ברוכ/ה הבא/ה</p>
        <h1 id="welcomeTitle">טוען...</h1>
        <p id="roleBadge" class="role-badge" data-i18n="you_are_admin" hidden>את/ה מנהל/ת</p>
        <p id="welcomeSubtitle" class="muted welcome-subtitle" hidden>בחר את המסלול שתרצה/י להמשיך אליו.</p>
        <div id="welcomeActions" class="welcome-actions"></div>
      </div>
    </section>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
