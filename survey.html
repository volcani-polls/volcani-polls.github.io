<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title data-i18n="nav_voter">סקר הרצאה</title>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="home.html">
      <img src="assets/Volcani_W.png" alt="Volcani" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
      <span style="display:none;">V</span>
      <span class="logo-text" data-i18n="app_title">מערכת הסקרים - כנס הסטודנטים השישי</span>
    </a>
    <button class="hamburger-btn" onclick="this.nextElementSibling.classList.toggle('open')">
      <i class="fa-solid fa-bars"></i>
    </button>
    <nav>
      <a href="home.html" data-i18n="nav_home"><i class="fa-solid fa-house"></i> דף הבית</a>
      <a href="voter.html" data-i18n="nav_voter"><i class="fa-solid fa-square-poll-vertical"></i> עמוד הצבעות</a>
      <a id="adminLink" href="admin.html" data-i18n="nav_admin" hidden><i class="fa-solid fa-cog"></i> ממשק ניהול</a>
      <button class="btn link" data-logout type="button" data-i18n="nav_logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
    </nav>
  </header>
  <main class="container narrow page-transition">
    <section class="page-title">
      <div>
        <h1 id="lectureTitle" data-i18n="loading">טוען...</h1>
        <p id="lectureMeta"></p>
      </div>
      <a class="btn" href="voter.html" data-i18n="back_to_voter">חזרה לעמוד הצבעות</a>
    </section>
    <div id="message" class="message" hidden></div>
    <form id="surveyForm" class="survey-form"></form>
  </main>
  <script type="module" src="js/survey.js"></script>
</body>
</html>
