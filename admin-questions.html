<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <title data-i18n="manage_questions">ניהול שאלות</title>
</head>
<body>
  <header class="topbar">
    <a class="logo" href="home.html">
      <img src="assets/Volcani_W.png" alt="Volcani" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
      <span style="display:none;">V</span>
      <div class="logo-text-wrapper">
        <span class="logo-text" data-i18n="app_title">מערכת הסקרים - כנס הסטודנטים השישי</span>
        <span class="logo-subtitle" data-i18n="app_subtitle">פותח על ידי המכון להנדסת מערכות חקלאיות וביולוגיות</span>
      </div>
    </a>
    <nav>
      <a href="home.html" data-i18n="nav_home"><i class="fa-solid fa-house"></i> דף הבית</a>
      <a href="admin.html" data-i18n="nav_admin"><i class="fa-solid fa-cog"></i> ממשק ניהול</a>
      <a href="admin-compare.html" data-i18n="compare_lectures"><i class="fa-solid fa-trophy"></i> השוואת הרצאות</a>
      <a href="admin-questions.html" data-i18n="manage_questions"><i class="fa-solid fa-list-check"></i> ניהול שאלות</a>
      <a href="admin-users.html" data-i18n="nav_admin_users"><i class="fa-solid fa-user-shield"></i> ניהול מנהלים</a>
      <a href="voter.html" data-i18n="nav_voter"><i class="fa-solid fa-square-poll-vertical"></i> עמוד הצבעות</a>
      <button class="btn link" data-logout type="button" data-i18n="nav_logout"><i class="fa-solid fa-right-from-bracket"></i> יציאה</button>
    </nav>
  </header>
  <main class="container narrow page-transition">
    <section class="page-title">
      <div>
        <h1 data-i18n="manage_questions">ניהול שאלות</h1>
        <p data-i18n="manage_questions_desc">שאלות אלו יופיעו בכל ההרצאות. שינוי כאן ישפיע על כל ההרצאות הקיימות.</p>
      </div>
    </section>
    
    <div id="message" class="message" hidden></div>
    
    <div class="panel">
      <form id="questionsForm">
        <div id="questionsBox" class="questions-edit"></div>
        <button type="button" id="addQuestionBtn" class="btn secondary">
          <i class="fa-solid fa-plus"></i> <span data-i18n="add_question">הוספת שאלה</span>
        </button>
        <button type="submit" id="saveBtn" class="btn primary full" style="margin-top: 16px;">
          <i class="fa-solid fa-save"></i> <span data-i18n="save_questions">שמור שאלות</span>
        </button>
      </form>
    </div>
  </main>
  <script type="module" src="js/admin-questions.js"></script>
</body>
</html>
