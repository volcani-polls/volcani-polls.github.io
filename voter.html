<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

  <title data-i18n="nav_voter">עמוד הצבעות</title>
</head>
<body>
  <header class="topbar">

      <img src="assets/Volcani_W.png" alt="Volcani" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
      <span style="display:none;">V</span>
      <div class="logo-text-wrapper">
        <span class="logo-text" data-i18n="app_title">מערכת הסקרים - כנס הסטודנטים השישי</span>
        <span class="logo-subtitle" data-i18n="app_subtitle">פותח על ידי המכון להנדסת מערכות חקלאיות וביולוגיות</span>
      </div>
    </a>
    <nav>
      <a href="home.html" data-i18n="nav_home"><i class="fa-solid fa-house"></i> דף הבית</a>
      <a href="voter.html" data-i18n="nav_voter"><i class="fa-solid fa-square-poll-vertical"></i> עמוד הצבעות</a>

  <main class="container page-transition">
    <section class="page-title">
      <div>
        <h1 data-i18n="nav_voter">עמוד הצבעות</h1>
        <p>
          <span data-i18n="voter_subtitle_prefix">מחובר כעת בתור</span>

          <span data-i18n="voter_subtitle_suffix">, לחצו על אחת מההרצאות כדי להצביע.</span>
        </p>
      </div>

  <script type="module" src="js/voter.js"></script>
